<!doctype html>
<!-- @dsCard group="Type" name="Cormorant Garamond" subtitle="Voz editorial — instalada localmente (10 TTFs, pesos 300–700)" viewport="700x260" -->
<html lang="es"><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  .card{padding:24px 28px;min-height:100%;}
  
  .row{display:flex;align-items:baseline;justify-content:space-between;gap:24px;color:var(--fg1)}
  .big{font-family:var(--font-display);font-weight:400;line-height:1;font-size:96px;letter-spacing:-.02em}
  .meta{font-family:var(--font-sans);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg3);text-align:right}
  .quote{font-family:var(--font-display);font-style:italic;font-size:24px;line-height:1.25;margin-top:18px;max-width:60ch;color:var(--fg2)}

</style></head><body><div class="card">
  <div class="row">
    <span class="big">Aa</span>
    <span class="meta">Cormorant Garamond · local<br>Light · Regular · Medium · SemiBold · Bold + Italics<br>Editorial</span>
  </div>
  <div class="quote">«Una casa se hace con los muebles que se quedan.»</div>
</div></body></html>

<!doctype html>
<!-- @dsCard group="Brand" name="Personalidad · pares" subtitle="Cálido no almibarado · Editorial no…" viewport="700x220" -->
<html lang="es"><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  .card{padding:24px 28px;min-height:100%;}
  
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .pair{padding:12px 0;border-top:.5px solid #D7C7A8}
  .yes{font-family:var(--font-display);font-size:20px;line-height:1;color:var(--fg1)}
  .no{font-family:var(--font-sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg3);margin-top:4px}
  .no::before{content:"no ";opacity:.6}

</style></head><body><div class="card">
  <div class="grid">
    <div class="pair"><div class="yes">Cálido</div><div class="no">almibarado</div></div>
    <div class="pair"><div class="yes">Editorial</div><div class="no">publicitario</div></div>
    <div class="pair"><div class="yes">Pausado</div><div class="no">aburrido</div></div>
    <div class="pair"><div class="yes">Adulto</div><div class="no">envejecido</div></div>
    <div class="pair"><div class="yes">Concreto</div><div class="no">técnico</div></div>
    <div class="pair"><div class="yes">Confiado</div><div class="no">arrogante</div></div>
    <div class="pair"><div class="yes">Atento</div><div class="no">servil</div></div>
    <div class="pair"><div class="yes">Honesto</div><div class="no">ingenuo</div></div>
  </div>
</div></body></html>

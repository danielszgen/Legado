<!doctype html>
<!-- @dsCard group="Brand" name="Voz · ejemplo canónico" subtitle="Tres frases. Cero adornos." viewport="700x220" -->
<html lang="es"><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  .card{padding:24px 28px;min-height:100%;}
  
  body{background:#E8DDC8}
  .card{background:#E8DDC8}
  .quote{font-family:var(--font-display);font-style:italic;font-size:28px;line-height:1.25;color:#1A1410;max-width:36ch}
  .quote::before{content:"«";color:#C9A86A;font-size:1em;margin-right:.08em}
  .quote::after{content:"»";color:#C9A86A;font-size:1em;margin-left:.08em}
  .attr{font-family:var(--font-sans);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#6E4E32;margin-top:16px}
  .meta{font-family:var(--font-sans);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#8A6A4A;margin-top:8px}

</style></head><body><div class="card">
  <p class="quote">Lo hacemos cuando lo pides. Tarda cuatro semanas. Es así por una razón.</p>
  <div class="attr">— Voz de marca · ejemplo canónico</div>
  <div class="meta">Tres frases. Cero adornos. Una explicación. Una promesa.</div>
</div></body></html>

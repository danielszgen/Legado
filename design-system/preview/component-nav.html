<!doctype html>
<!-- @dsCard group="Components" name="Navegación principal" subtitle="Sello + wordmark + 4 enlaces + CTA" viewport="700x100" -->
<html lang="es"><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  .card{padding:24px 28px;min-height:100%;}
  
  body{background:#F4EFE6}
  .card{padding:0}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;border-bottom:.5px solid #D7C7A8}
  .left{display:flex;align-items:center;gap:14px}
  .seal-mini{width:34px;height:34px;border-radius:50%;border:.5px solid #4A3220;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-style:italic;color:#4A3220;font-size:14px}
  .wm{font-family:var(--font-display);font-size:18px;letter-spacing:.32em;color:#1A1410;text-transform:uppercase}
  .links{display:flex;gap:28px;font-family:var(--font-sans);font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#4A3220}
  .links a{border:none}
  .cta{font-family:var(--font-sans);font-size:10.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#1A1410;background:#C9A86A;padding:9px 14px;border-radius:2px}

</style></head><body><div class="card">
  <div class="nav">
    <div class="left"><div class="seal-mini">LG</div><div class="wm">Legado</div></div>
    <div class="links"><a>Colección</a><a>Materiales</a><a>Sobre nosotros</a><a>Contacto</a></div>
    <div class="cta">Ver la colección</div>
  </div>
</div></body></html>

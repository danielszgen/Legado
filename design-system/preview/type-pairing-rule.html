<!doctype html>
<!-- @dsCard group="Type" name="Regla de emparejamiento" subtitle="Serif recordar · Sans usar" viewport="700x250" -->
<html lang="es"><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  .card{padding:24px 28px;min-height:100%;}
  
  .row{display:grid;grid-template-columns:1fr 1fr;gap:0;border:.5px solid #D7C7A8;border-radius:3px;overflow:hidden}
  .col{padding:22px}
  .col + .col{border-left:.5px solid #D7C7A8}
  .lbl{font-family:var(--font-sans);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg3);margin-bottom:14px}
  .head{font-family:var(--font-display);font-size:36px;line-height:1;letter-spacing:-.01em;color:var(--fg1);margin-bottom:8px}
  .sub{font-family:var(--font-display);font-style:italic;color:var(--fg2);font-size:15px}
  .nav{font-family:var(--font-sans);font-size:13px;font-weight:500;letter-spacing:.04em;color:var(--fg1)}
  .btn{display:inline-block;font-family:var(--font-sans);font-size:11.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#1A1410;background:#C9A86A;padding:11px 18px;margin-top:8px}
  .footnote{font-family:var(--font-sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--fg3);margin-top:18px}

</style></head><body><div class="card">
  <div class="row">
    <div class="col">
      <div class="lbl">Serif · recordar</div>
      <div class="head">Baltic</div>
      <div class="sub">— el sillón de lectura</div>
    </div>
    <div class="col">
      <div class="lbl">Sans · usar</div>
      <div class="nav">Colección · Materiales · Sobre nosotros</div>
      <div class="btn">Ver la colección</div>
    </div>
  </div>
  <div class="footnote">Regla · serif para lo que el cliente recuerda · sans para lo que necesita</div>
</div></body></html>

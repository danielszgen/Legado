<!doctype html>
<!-- @dsCard group="Colors" name="Texturas · Cueros y Maderas" subtitle="Cognac · Tabaco · Moka · Nogal · Roble…" viewport="700x360" -->
<html lang="es"><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  .card{padding:24px 28px;min-height:100%;}
  
  .rows{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .tile{aspect-ratio:1.5/1;border-radius:2px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-sans);font-size:10px;letter-spacing:.16em;text-transform:uppercase}
  .group-label{font-family:var(--font-sans);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg3);margin:14px 0 6px;display:flex;justify-content:space-between}

</style></head><body><div class="card">
  <div class="group-label"><span>Cueros</span><span>§ 20</span></div>
  <div class="rows">
    <div class="tile" style="background:#9B5E2C;color:#F4EFE6">Cognac</div>
    <div class="tile" style="background:#6E4322;color:#F4EFE6">Tabaco</div>
    <div class="tile" style="background:#4A2E1E;color:#E8DDC8">Moka</div>
    <div class="tile" style="background:#7E5436;color:#F4EFE6">Castaño</div>
  </div>
  <div class="group-label"><span>Maderas</span><span>§ 22</span></div>
  <div class="rows">
    <div class="tile" style="background:#3A2616;color:#E8DDC8">Nogal oscuro</div>
    <div class="tile" style="background:#A77E48;color:#1A1410">Roble natural</div>
    <div class="tile" style="background:#7C5430;color:#F4EFE6">Castaño</div>
    <div class="tile" style="background:#8A4D38;color:#F4EFE6">Cerezo</div>
  </div>
</div></body></html>

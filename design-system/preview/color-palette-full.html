<!doctype html>
<!-- @dsCard group="Colors" name="Paleta · 7 tonos" subtitle="Marfil · Beige · Piel · Cuero · Nogal · Ébano · Dorado" viewport="700x220" -->
<html lang="es"><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  .card{padding:24px 28px;min-height:100%;}
  
  .swatches{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .sw{aspect-ratio:1/1.05;border-radius:2px;position:relative;overflow:hidden;box-shadow:var(--shadow-sink)}
  .sw .label{position:absolute;left:8px;right:8px;bottom:8px;font-family:var(--font-sans);font-size:10px;letter-spacing:.18em;text-transform:uppercase}
  .sw .hex{position:absolute;left:8px;top:8px;font-family:var(--font-sans);font-size:9.5px;letter-spacing:.05em;opacity:.7;font-variant-numeric:tabular-nums}

</style></head><body><div class="card">
  <div class="swatches">
    <div class="sw" style="background:#F4EFE6;color:#4A3220"><span class="hex">F4EFE6</span><span class="label">Marfil</span></div>
    <div class="sw" style="background:#E8DDC8;color:#4A3220"><span class="hex">E8DDC8</span><span class="label">Beige</span></div>
    <div class="sw" style="background:#C9A07A;color:#1A1410"><span class="hex">C9A07A</span><span class="label">Piel</span></div>
    <div class="sw" style="background:#6E4E32;color:#F4EFE6"><span class="hex">6E4E32</span><span class="label">Cuero</span></div>
    <div class="sw" style="background:#4A3220;color:#F4EFE6"><span class="hex">4A3220</span><span class="label">Nogal</span></div>
    <div class="sw" style="background:#1A1410;color:#C9A86A"><span class="hex">1A1410</span><span class="label">Ébano</span></div>
    <div class="sw" style="background:#C9A86A;color:#1A1410"><span class="hex">C9A86A</span><span class="label">Dorado</span></div>
  </div>
</div></body></html>
